<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Leaflet Weltkarte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
  #worldMap { height: 500px; width: 100%; margin: 20px 0; }
</style>
</head>
<body>
<h1>From Paris to New York</h1>
<div id="worldMap"></div>

<script>
  const map = L.map('worldMap').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  L.marker([48.8566, 2.3522]).addTo(map).bindPopup('Paris');
  L.marker([40.7128, -74.0060]).addTo(map).bindPopup('New York');
</script>
</body>
</html>
